name: CI

on:
    push:
        branches:
            - main
            - master

    pull_request:
        branches:
            - main
            - master

jobs:
    quality:
        name: Typecheck, lint and build
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js 24
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Typecheck
              run: npm run typecheck

            - name: Lint
              run: npm run lint

            - name: Build
              run: npm run build
